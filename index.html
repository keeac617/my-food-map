<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的專屬美食地圖</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', '微軟正黑體', sans-serif; background-color: #f8fafc; }
        .glass-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
        #map { min-height: 450px; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        /* 踩雷店家的列表卡片樣式 */
        .bad-store-card { background-color: #f1f5f9; opacity: 0.6; filter: grayscale(50%); border-color: #cbd5e1; }
        .custom-map-label {
            text-shadow: 2px 2px 0 #fff, -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff, 0 1px 0 #fff, 0 -1px 0 #fff;
            white-space: nowrap;
            margin-top: -2px;
        }
    </style>
</head>
<body class="text-slate-800 p-4 md:p-8 flex justify-center">

    <!-- 浮動提示訊息 -->
    <div id="toast" class="fixed top-5 left-1/2 transform -translate-x-1/2 px-6 py-3 rounded-full text-white shadow-xl transition-opacity duration-300 z-[100] hidden font-bold"></div>

    <div class="max-w-4xl w-full">
        <!-- 頭部區塊、分享與最愛按鈕 -->
        <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
            <h1 class="text-3xl font-extrabold text-slate-800 tracking-tight"><i class="fa-solid fa-utensils text-orange-500 mr-2"></i>美食探測儀</h1>
            <div class="flex gap-2 w-full md:w-auto">
                <button onclick="toggleShareModal()" class="flex-1 md:flex-none bg-indigo-100 text-indigo-600 hover:bg-indigo-200 px-5 py-2.5 rounded-full font-bold transition shadow-sm flex items-center justify-center">
                    <i class="fa-solid fa-share-nodes mr-2"></i> 分享清單 / 跨裝置
                </button>
                <button onclick="toggleFavModal()" class="flex-1 md:flex-none bg-rose-100 text-rose-600 hover:bg-rose-200 px-5 py-2.5 rounded-full font-bold transition shadow-sm flex items-center justify-center">
                    <i class="fa-solid fa-star mr-2"></i> 我的最愛
                </button>
            </div>
        </div>

        <!-- 歷史紀錄、收藏地點與地址搜尋區 -->
        <div class="glass-panel p-5 rounded-2xl shadow-sm border border-slate-200 mb-6 relative z-20">
            <h3 class="text-sm font-bold text-slate-500 mb-2"><i class="fa-solid fa-location-crosshairs mr-1"></i> 1. 定位你的探索中心</h3>
            <div class="flex flex-col sm:flex-row gap-2">
                <div class="relative w-full flex">
                    <button id="btn-fav-loc" onclick="toggleFavLocation()" class="absolute left-3 top-1/2 transform -translate-y-1/2 text-slate-400 hover:text-rose-500 transition text-xl z-10" title="收藏/取消收藏此地點">
                        <i class="fa-regular fa-heart"></i>
                    </button>
                    <input type="text" id="address-input" onfocus="showHistory()" oninput="updateLocFavBtn()" onblur="hideHistoryDelay()" placeholder="輸入地址、商圈或區域 (如: 信義區)..." 
                           class="w-full pl-10 bg-slate-50 border border-slate-300 text-slate-900 rounded-xl focus:ring-blue-500 focus:border-blue-500 block p-3 outline-none transition shadow-inner"
                           onkeypress="if(event.key === 'Enter') { geocodeAddress(); this.blur(); }">
                    <div id="history-dropdown" class="absolute z-50 w-full bg-white border border-slate-200 shadow-xl rounded-xl mt-12 hidden max-h-56 overflow-y-auto custom-scrollbar">
                        <!-- 歷史紀錄與收藏地點動態產生區 -->
                    </div>
                </div>
                <div class="flex gap-2">
                    <button onclick="getCurrentLocation()" class="bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold rounded-xl px-4 py-3 transition shadow-sm" title="使用目前位置"><i class="fa-solid fa-location-arrow"></i></button>
                    <button onclick="geocodeAddress()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl px-6 py-3 transition shadow-md whitespace-nowrap">📍 定位</button>
                </div>
            </div>
        </div>

        <!-- 手動標籤與精準搜尋區 -->
        <div class="mb-6 bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
            <h3 class="text-sm font-bold text-slate-500 mb-3"><i class="fa-solid fa-magnifying-glass text-indigo-500 mr-1"></i> 2. 搜尋特定店家或選擇類別</h3>
            
            <div class="flex flex-col sm:flex-row gap-2 mb-4">
                <input type="text" id="store-name-input" placeholder="直接搜尋特定店名 (例：麥當勞、鼎泰豐)..." class="flex-1 bg-slate-50 border border-slate-300 text-slate-900 rounded-xl px-4 py-2.5 focus:ring-indigo-500 focus:border-indigo-500 outline-none shadow-inner transition" onkeypress="if(event.key === 'Enter') { searchStoreName(); this.blur(); }">
                <button onclick="searchStoreName()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl px-6 py-2.5 transition shadow-sm whitespace-nowrap"><i class="fa-solid fa-search mr-1"></i> 搜尋店家</button>
            </div>
            
            <hr class="border-slate-100 my-4">
            
            <div class="flex flex-wrap gap-2 mb-4 max-h-48 overflow-y-auto custom-scrollbar p-1">
                <!-- 麵/飯/正餐類 -->
                <button onclick="manualSearch('拉麵')" class="px-3 py-1.5 bg-slate-50 border border-slate-200 text-slate-700 rounded-full text-sm font-bold hover:bg-indigo-50 hover:text-indigo-600 hover:border-indigo-300 transition">🍜 拉麵</button>
                <button onclick="manualSearch('義大利麵')" class="px-3 py-1.5 bg-slate-50 border border-slate-200 text-slate-700 rounded-full text-sm font-bold hover:bg-indigo-50 hover:text-indigo-600 hover:border-indigo-300 transition">🍝 義大利麵</button>
                <button onclick="manualSearch('滷肉飯')" class="px-3 py-1.5 bg-slate-50 border border-slate-200 text-slate-700 rounded-full text-sm font-bold hover:bg-indigo-50 hover:text-indigo-600 hover:border-indigo-300 transition">🍚 滷肉飯</button>
                <button onclick="manualSearch('火鍋')" class="px-3 py-1.5 bg-slate-50 border border-slate-200 text-slate-700 rounded-full text-sm font-bold hover:bg-indigo-50 hover:text-indigo-600 hover:border-indigo-300 transition">🍲 火鍋</button>
                <button onclick="manualSearch('燒肉')" class="px-3 py-1.5 bg-slate-50 border border-slate-200 text-slate-700 rounded-full text-sm font-bold hover:bg-indigo-50 hover:text-indigo-600 hover:border-indigo-300 transition">🥩 燒肉</button>
                <button onclick="manualSearch('牛排')" class="px-3 py-1.5 bg-slate-50 border border-slate-200 text-slate-700 rounded-full text-sm font-bold hover:bg-indigo-50 hover:text-indigo-600 hover:border-indigo-300 transition">🥩 牛排</button>
                <button onclick="manualSearch('壽司')" class="px-3 py-1.5 bg-slate-50 border border-slate-200 text-slate-700 rounded-full text-sm font-bold hover:bg-indigo-50 hover:text-indigo-600 hover:border-indigo-300 transition">🍣 壽司</button>
                <button onclick="manualSearch('咖哩')" class="px-3 py-1.5 bg-slate-50 border border-slate-200 text-slate-700 rounded-full text-sm font-bold hover:bg-indigo-50 hover:text-indigo-600 hover:border-indigo-300 transition">🍛 咖哩</button>
                <button onclick="manualSearch('披薩')" class="px-3 py-1.5 bg-slate-50 border border-slate-200 text-slate-700 rounded-full text-sm font-bold hover:bg-indigo-50 hover:text-indigo-600 hover:border-indigo-300 transition">🍕 披薩</button>
                <button onclick="manualSearch('吃到飽')" class="px-3 py-1.5 bg-slate-50 border border-slate-200 text-slate-700 rounded-full text-sm font-bold hover:bg-indigo-50 hover:text-indigo-600 hover:border-indigo-300 transition">🍽️ 吃到飽</button>
                <button onclick="manualSearch('健康餐')" class="px-3 py-1.5 bg-slate-50 border border-slate-200 text-slate-700 rounded-full text-sm font-bold hover:bg-indigo-50 hover:text-indigo-600 hover:border-indigo-300 transition">🥗 健康餐</button>
                <button onclick="manualSearch('素食')" class="px-3 py-1.5 bg-slate-50 border border-slate-200 text-slate-700 rounded-full text-sm font-bold hover:bg-indigo-50 hover:text-indigo-600 hover:border-indigo-300 transition">🥬 素食</button>
                
                <!-- 異國料理 -->
                <button onclick="manualSearch('日式')" class="px-3 py-1.5 bg-slate-50 border border-slate-200 text-slate-700 rounded-full text-sm font-bold hover:bg-indigo-50 hover:text-indigo-600 hover:border-indigo-300 transition">🍱 日式</button>
                <button onclick="manualSearch('韓式')" class="px-3 py-1.5 bg-slate-50 border border-slate-200 text-slate-700 rounded-full text-sm font-bold hover:bg-indigo-50 hover:text-indigo-600 hover:border-indigo-300 transition">🍲 韓式</button>
                <button onclick="manualSearch('港式')" class="px-3 py-1.5 bg-slate-50 border border-slate-200 text-slate-700 rounded-full text-sm font-bold hover:bg-indigo-50 hover:text-indigo-600 hover:border-indigo-300 transition">🥟 港式</button>
                <button onclick="manualSearch('泰式')" class="px-3 py-1.5 bg-slate-50 border border-slate-200 text-slate-700 rounded-full text-sm font-bold hover:bg-indigo-50 hover:text-indigo-600 hover:border-indigo-300 transition">🥘 泰式</button>
                <button onclick="manualSearch('台式')" class="px-3 py-1.5 bg-slate-50 border border-slate-200 text-slate-700 rounded-full text-sm font-bold hover:bg-indigo-50 hover:text-indigo-600 hover:border-indigo-300 transition">🥢 台式</button>
                <button onclick="manualSearch('中式')" class="px-3 py-1.5 bg-slate-50 border border-slate-200 text-slate-700 rounded-full text-sm font-bold hover:bg-indigo-50 hover:text-indigo-600 hover:border-indigo-300 transition">🥡 中式</button>
                <button onclick="manualSearch('西式')" class="px-3 py-1.5 bg-slate-50 border border-slate-200 text-slate-700 rounded-full text-sm font-bold hover:bg-indigo-50 hover:text-indigo-600 hover:border-indigo-300 transition">🍴 西式</button>
                
                <!-- 小吃/速食類 -->
                <button onclick="manualSearch('早午餐')" class="px-3 py-1.5 bg-slate-50 border border-slate-200 text-slate-700 rounded-full text-sm font-bold hover:bg-indigo-50 hover:text-indigo-600 hover:border-indigo-300 transition">🍳 早午餐</button>
                <button onclick="manualSearch('速食')" class="px-3 py-1.5 bg-slate-50 border border-slate-200 text-slate-700 rounded-full text-sm font-bold hover:bg-indigo-50 hover:text-indigo-600 hover:border-indigo-300 transition">🍔 速食</button>
                <button onclick="manualSearch('鹽酥雞')" class="px-3 py-1.5 bg-slate-50 border border-slate-200 text-slate-700 rounded-full text-sm font-bold hover:bg-indigo-50 hover:text-indigo-600 hover:border-indigo-300 transition">🍗 鹽酥雞</button>
                <button onclick="manualSearch('蔥油餅')" class="px-3 py-1.5 bg-slate-50 border border-slate-200 text-slate-700 rounded-full text-sm font-bold hover:bg-indigo-50 hover:text-indigo-600 hover:border-indigo-300 transition">🥞 蔥油餅</button>
                <button onclick="manualSearch('餡餅')" class="px-3 py-1.5 bg-slate-50 border border-slate-200 text-slate-700 rounded-full text-sm font-bold hover:bg-indigo-50 hover:text-indigo-600 hover:border-indigo-300 transition">🥟 餡餅</button>
                <button onclick="manualSearch('章魚燒')" class="px-3 py-1.5 bg-slate-50 border border-slate-200 text-slate-700 rounded-full text-sm font-bold hover:bg-indigo-50 hover:text-indigo-600 hover:border-indigo-300 transition">🐙 章魚燒</button>
                <button onclick="manualSearch('虱目魚')" class="px-3 py-1.5 bg-slate-50 border border-slate-200 text-slate-700 rounded-full text-sm font-bold hover:bg-indigo-50 hover:text-indigo-600 hover:border-indigo-300 transition">🐟 虱目魚</button>
                
                <!-- 甜點/飲料/宵夜類 -->
                <button onclick="manualSearch('咖啡廳')" class="px-3 py-1.5 bg-slate-50 border border-slate-200 text-slate-700 rounded-full text-sm font-bold hover:bg-indigo-50 hover:text-indigo-600 hover:border-indigo-300 transition">☕ 咖啡廳</button>
                <button onclick="manualSearch('甜點')" class="px-3 py-1.5 bg-slate-50 border border-slate-200 text-slate-700 rounded-full text-sm font-bold hover:bg-indigo-50 hover:text-indigo-600 hover:border-indigo-300 transition">🍰 甜點</button>
                <button onclick="manualSearch('冰')" class="px-3 py-1.5 bg-slate-50 border border-slate-200 text-slate-700 rounded-full text-sm font-bold hover:bg-indigo-50 hover:text-indigo-600 hover:border-indigo-300 transition">🍨 冰</button>
                <button onclick="manualSearch('雪花冰')" class="px-3 py-1.5 bg-slate-50 border border-slate-200 text-slate-700 rounded-full text-sm font-bold hover:bg-indigo-50 hover:text-indigo-600 hover:border-indigo-300 transition">🍧 雪花冰</button>
                <button onclick="manualSearch('豆花')" class="px-3 py-1.5 bg-slate-50 border border-slate-200 text-slate-700 rounded-full text-sm font-bold hover:bg-indigo-50 hover:text-indigo-600 hover:border-indigo-300 transition">🥣 豆花</button>
                <button onclick="manualSearch('手搖飲料')" class="px-3 py-1.5 bg-slate-50 border border-slate-200 text-slate-700 rounded-full text-sm font-bold hover:bg-indigo-50 hover:text-indigo-600 hover:border-indigo-300 transition">🧋 手搖飲料</button>
                <button onclick="manualSearch('居酒屋')" class="px-3 py-1.5 bg-slate-50 border border-slate-200 text-slate-700 rounded-full text-sm font-bold hover:bg-indigo-50 hover:text-indigo-600 hover:border-indigo-300 transition">🍢 居酒屋</button>
                <button onclick="manualSearch('酒吧')" class="px-3 py-1.5 bg-slate-50 border border-slate-200 text-slate-700 rounded-full text-sm font-bold hover:bg-indigo-50 hover:text-indigo-600 hover:border-indigo-300 transition">🍺 酒吧</button>
            </div>

            <!-- 隨機推薦與抽籤區塊 -->
            <div class="flex flex-col md:flex-row gap-3 pt-3 border-t border-slate-100">
                <button onclick="spinRoulette('food')" class="flex-1 bg-orange-500 hover:bg-orange-600 text-white font-bold py-2.5 rounded-xl transition shadow-sm"><i class="fa-solid fa-dice mr-1"></i> 隨機吃什麼</button>
                <button onclick="spinRoulette('drink')" class="flex-1 bg-teal-500 hover:bg-teal-600 text-white font-bold py-2.5 rounded-xl transition shadow-sm"><i class="fa-solid fa-dice mr-1"></i> 隨機喝什麼</button>
                
                <div class="flex flex-1">
                    <select id="pocket-category" class="bg-slate-100 border border-slate-300 text-slate-700 rounded-l-xl px-3 font-bold outline-none focus:border-slate-400">
                        <option value="all">全類別</option>
                        <option value="美食">🍱 美食</option>
                        <option value="飲料">🧋 飲料</option>
                        <option value="甜點">🍰 甜點</option>
                    </select>
                    <button onclick="spinPocket()" class="flex-1 bg-slate-800 hover:bg-slate-900 text-white font-bold py-2.5 rounded-r-xl transition shadow-sm"><i class="fa-solid fa-gift mr-1"></i> 盲抽</button>
                </div>
            </div>
            <p id="roulette-result" class="text-center font-bold text-lg text-slate-700 mt-4 h-6">❓ 先定位，再搜尋或選擇類別！</p>
        </div>

        <!-- 地圖與 8 公里擴大搜尋按鈕 -->
        <div class="relative mb-6 z-10">
            <div id="map" class="w-full rounded-2xl shadow-inner border border-slate-300 bg-slate-200 flex items-center justify-center overflow-hidden">
                <p class="text-slate-500 font-bold"><i class="fa-solid fa-map-location-dot text-2xl mb-2 block text-center"></i>地圖準備中...</p>
            </div>
            <button id="expand-btn" onclick="expandSearchTo8km()" class="hidden absolute bottom-4 left-1/2 transform -translate-x-1/2 bg-white text-blue-600 border border-blue-200 px-5 py-2.5 rounded-full font-extrabold shadow-xl hover:bg-blue-50 transition z-10 flex items-center">
                <i class="fa-solid fa-radar mr-2 animate-pulse"></i> 擴大搜尋 8 公里範圍
            </button>
        </div>

        <!-- 附近店家列表區塊 -->
        <div id="results-list-section" class="hidden mb-6">
            <div class="flex justify-between items-end mb-3">
                <h3 class="text-lg font-bold text-slate-700"><i class="fa-solid fa-list-ul text-blue-500 mr-2"></i>搜尋結果列表</h3>
                <span id="results-count" class="text-sm font-bold text-slate-400">共 0 家</span>
            </div>
            <!-- 卡片網格 -->
            <div id="results-list-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 max-h-[500px] overflow-y-auto custom-scrollbar p-1 mb-4">
                <!-- 列表卡片會透過 JS 產生在這裡 -->
            </div>
            <!-- 載入更多結果按鈕 -->
            <div class="text-center">
                <button id="load-more-btn" onclick="loadMoreResults()" class="hidden bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold py-2.5 px-8 rounded-full transition shadow-sm border border-slate-300">
                    ➕ 載入更多結果
                </button>
            </div>
        </div>

        <!-- 餐廳詳細資訊與評論區塊 (預設隱藏) -->
        <div id="review-section" class="hidden mb-10 bg-white p-6 rounded-2xl shadow-xl border border-slate-200 fade-in relative overflow-hidden">
            <button onclick="closeReview()" class="absolute top-4 right-4 text-slate-400 hover:text-slate-600 bg-slate-100 rounded-full w-8 h-8 flex items-center justify-center transition"><i class="fa-solid fa-xmark"></i></button>
            
            <div class="flex justify-between items-start mb-4 pr-10">
                <div>
                    <h2 id="review-target" class="text-2xl font-extrabold text-slate-800 mb-1 line-clamp-2">店名</h2>
                    <p id="detail-rating" class="text-sm text-slate-500 font-medium"></p>
                </div>
                <!-- 獨立的加入最愛按鈕 -->
                <button id="fav-btn-detail" onclick="toggleFavoriteFromDetail()" class="text-2xl text-slate-300 hover:text-rose-500 transition focus:outline-none flex-shrink-0 ml-2" title="加入/移除最愛">
                    <i class="fa-solid fa-heart"></i>
                </button>
            </div>

            <!-- 詳細資訊面板 -->
            <div id="detail-info" class="bg-slate-50 p-4 rounded-xl mb-5 text-sm text-slate-600 space-y-3 border border-slate-100">
                <p class="flex items-start"><i class="fa-solid fa-clock w-5 text-slate-400 mt-0.5"></i> <span id="detail-hours">載入中...</span></p>
                <p class="flex items-center"><i class="fa-solid fa-phone w-5 text-slate-400"></i> <span id="detail-phone">載入中...</span></p>
                <p class="flex items-center"><i class="fa-solid fa-link w-5 text-slate-400"></i> <a id="detail-url" href="#" target="_blank" class="text-blue-600 font-bold hover:underline">查看 Google 地圖實景與菜單</a></p>
                <div id="detail-photos" class="flex gap-2 mt-3 overflow-x-auto custom-scrollbar pb-2 pt-2"></div>
            </div>

            <hr class="border-slate-100 my-5">

            <!-- 專屬評論與避雷針設定區 -->
            <h3 class="font-bold text-slate-700 mb-3"><i class="fa-solid fa-book text-blue-500 mr-1"></i> 我的專屬評論筆記</h3>
            <div class="flex gap-3 mb-3">
                <button id="btn-good" onclick="rate('good')" class="flex-1 bg-white hover:bg-green-50 text-slate-600 border border-slate-200 font-bold py-2.5 rounded-xl transition shadow-sm"><i class="fa-solid fa-thumbs-up mr-1"></i> 超讚</button>
                <button id="btn-bad" onclick="rate('bad')" class="flex-1 bg-white hover:bg-red-50 text-slate-600 border border-slate-200 font-bold py-2.5 rounded-xl transition shadow-sm"><i class="fa-solid fa-thumbs-down mr-1"></i> 踩雷了</button>
            </div>
            <textarea id="review-note" rows="2" placeholder="寫下你的評語 (例如：這家必點什麼、哪裡不好吃...)" class="w-full bg-slate-50 border border-slate-300 rounded-xl p-3 text-sm focus:ring-blue-500 focus:border-blue-500 outline-none mb-3 resize-none transition shadow-inner"></textarea>
            <button onclick="saveReview()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-extrabold py-3 rounded-xl transition shadow-md flex items-center justify-center">
                <i class="fa-solid fa-floppy-disk mr-2"></i> 儲存筆記
            </button>
        </div>
        
        <!-- 底部版號資訊 -->
        <div class="text-center text-slate-400 text-xs mt-8 mb-4 font-mono">
            3.1 Serverless | 2026/05/27 19:58
        </div>
    </div>

    <!-- 我的最愛清單彈窗 (Modal) -->
    <div id="fav-modal" class="fixed inset-0 bg-slate-900 bg-opacity-60 z-50 hidden flex justify-center items-center backdrop-blur-sm">
        <div class="bg-white rounded-2xl w-11/12 max-w-lg max-h-[80vh] flex flex-col shadow-2xl fade-in relative">
            <div class="p-5 border-b border-slate-100 flex justify-between items-center bg-slate-50 rounded-t-2xl">
                <h2 class="text-xl font-extrabold text-slate-800"><i class="fa-solid fa-bookmark text-rose-500 mr-2"></i>我的收藏本</h2>
                <button onclick="toggleFavModal()" class="text-slate-400 hover:text-slate-600"><i class="fa-solid fa-xmark text-2xl"></i></button>
            </div>
            <div class="p-5 overflow-y-auto custom-scrollbar flex-1">
                <div id="fav-list-content" class="space-y-4"></div>
            </div>
        </div>
    </div>

    <!-- ⚡ 分享與匯入清單彈窗 (Modal) -->
    <div id="share-modal" class="fixed inset-0 bg-slate-900 bg-opacity-60 z-50 hidden flex justify-center items-center backdrop-blur-sm">
        <div class="bg-white rounded-2xl w-11/12 max-w-md flex flex-col shadow-2xl p-6 relative fade-in">
            <button onclick="toggleShareModal()" class="absolute top-4 right-4 text-slate-400 hover:text-slate-600"><i class="fa-solid fa-xmark text-xl"></i></button>
            <h2 class="text-xl font-extrabold text-slate-800 mb-2"><i class="fa-solid fa-share-nodes text-indigo-500 mr-2"></i>分享 / 跨裝置同步</h2>
            <p class="text-xs text-slate-500 mb-4 leading-relaxed">點擊下方按鈕，系統會將你目前的「收藏本與筆記」打包成一段專屬網址。你可以傳到自己的手機上直接開啟，或是傳給朋友，讓他們一鍵匯入你的私房名單！</p>
            <textarea id="share-link-box" readonly class="w-full bg-slate-50 border border-slate-300 rounded-xl p-3 text-xs text-slate-400 focus:outline-none mb-3 resize-none h-20" placeholder="點擊按鈕產生專屬連結..."></textarea>
            <button onclick="generateAndCopyShareLink()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-extrabold py-3 rounded-xl transition shadow-md flex justify-center items-center">
                <i class="fa-solid fa-copy mr-2"></i> 產生連結並複製
            </button>
        </div>
    </div>

    <script>
        // 解決地圖載入順序衝突
        window.gmapsLoaded = false;
        window.initMapAsync = function() {
            window.gmapsLoaded = true;
            if (typeof window.initMap === 'function') window.initMap();
        };

        // 讀取 LocalStorage 當作預設基礎
        window.reviews = JSON.parse(localStorage.getItem('foodReviews')) || {};
        window.favorites = JSON.parse(localStorage.getItem('foodFavs')) || [];
        window.searchHistory = JSON.parse(localStorage.getItem('foodHistory')) || [];
        window.favLocations = JSON.parse(localStorage.getItem('foodFavLocs')) || [];

        // 單機儲存機制 (取代雲端)
        window.saveToLocal = function() {
            localStorage.setItem('foodReviews', JSON.stringify(window.reviews));
            localStorage.setItem('foodFavs', JSON.stringify(window.favorites));
            localStorage.setItem('foodHistory', JSON.stringify(window.searchHistory));
            localStorage.setItem('foodFavLocs', JSON.stringify(window.favLocations));
            updateUIForData();
        }

        // ==========================================
        // ⚡ 核心黑科技：免伺服器「網址分享與匯入」系統
        // ==========================================
        window.toggleShareModal = function() {
            const m = document.getElementById('share-modal');
            if(m.classList.contains('hidden')) {
                document.getElementById('share-link-box').value = '';
                m.classList.remove('hidden');
            } else {
                m.classList.add('hidden');
            }
        }

        window.generateAndCopyShareLink = function() {
            // 將重要資料打包
            const payload = {
                f: window.favorites,
                r: window.reviews,
                h: window.favLocations
            };
            // 透過 Base64 壓縮編碼成網址字串
            const encodedData = encodeURIComponent(btoa(unescape(encodeURIComponent(JSON.stringify(payload)))));
            // 將編碼動態接在當前網址後面，避免寫死網址出錯
            const shareUrl = window.location.origin + window.location.pathname + "?data=" + encodedData;
            
            const linkBox = document.getElementById('share-link-box');
            linkBox.value = shareUrl;
            linkBox.select();
            document.execCommand('copy');
            
            window.showToast("✅ 連結已複製！傳送到手機或分享給朋友吧！");
        }

        // 當網頁載入時，檢查網址有沒有帶分享代碼
        window.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const dataParam = params.get('data');
            
            if (dataParam) {
                try {
                    // 解碼拿回資料
                    const importedData = JSON.parse(decodeURIComponent(escape(atob(decodeURIComponent(dataParam)))));
                    
                    if (confirm("💌 偵測到分享的口袋名單！是否要匯入並與您現有的名單合併？\n\n(放心，不會刪除您原本的紀錄)")) {
                        // 智慧合併最愛清單
                        const importedFavs = importedData.f || [];
                        const mergedFavs = [...window.favorites];
                        importedFavs.forEach(inf => {
                            if (!mergedFavs.some(mf => mf.name === inf.name)) mergedFavs.push(inf);
                        });
                        window.favorites = mergedFavs;
                        
                        // 智慧合併筆記與常用地點
                        window.reviews = { ...(importedData.r || {}), ...window.reviews };
                        window.favLocations = [...new Set([...window.favLocations, ...(importedData.h || [])])];
                        
                        window.saveToLocal();
                        window.showToast("🎉 匯入成功！所有的名單都合併好囉！");
                    }
                    
                    // 清除網址列的落落長代碼，保持畫面乾淨
                    window.history.replaceState({}, document.title, window.location.pathname);
                } catch (e) {
                    console.error("匯入解析失敗:", e);
                    window.showToast("❌ 分享連結似乎失效或損毀了", "error");
                }
            }
        });

        // ==========================================
        // 介面更新與主要功能區
        // ==========================================
        function updateUIForData() {
            window.updateLocFavBtn();
            if(!document.getElementById('fav-modal').classList.contains('hidden')) {
                window.renderFavList();
            }
            if(window.currentSelectedPlace) window.updateDetailUI();
            if(window.currentKeyword && window.currentPlacesList) {
                // 更新列表與地圖標籤狀態
                window.renderResultsList(window.currentPlacesList);
                clearMarkers();
                window.currentPlacesList.forEach((place, index) => createMarker(place, index));
            }
        }

        const foodList = ["拉麵", "火鍋", "水餃", "義大利麵", "牛排", "早午餐", "壽司", "燒肉", "健康餐", "漢堡", "滷肉飯", "蔥油餅"];
        const drinkList = ["珍珠奶茶", "無糖綠茶", "拿鐵咖啡", "水果茶", "手沖單品", "豆花", "冰品", "手搖飲料"];

        let map, service, infowindow, geocoder;
        let markers = [];
        window.currentPlacesList = []; 
        let currentPagination = null;
        let currentCenter = { lat: 25.0339, lng: 121.5644 }; 
        window.currentKeyword = "";
        let currentRadius = 1000;
        window.currentSelectedPlace = null; 
        let currentRating = ""; 

        window.showToast = function(msg, type = 'success') {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.className = `fixed top-5 left-1/2 transform -translate-x-1/2 px-6 py-3 rounded-full text-white shadow-xl transition-opacity duration-300 z-[100] font-bold ${type === 'error' ? 'bg-rose-500' : 'bg-emerald-500'}`;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 3000);
        }

        window.showHistory = function() {
            const drop = document.getElementById('history-dropdown');
            window.updateLocFavBtn(); 
            if (window.searchHistory.length === 0 && window.favLocations.length === 0) return;
            
            let html = "";
            if(window.favLocations.length > 0) {
                html += `<div class="bg-slate-50 px-3 py-1.5 text-xs font-bold text-slate-400 border-b border-slate-100">⭐ 收藏的地點</div>`;
                html += window.favLocations.map(h => 
                    `<div onclick="selectHistory('${h.replace(/'/g, "\\'")}')" class="px-4 py-3 hover:bg-slate-50 cursor-pointer text-sm text-slate-700 border-b border-slate-100 font-medium flex items-center"><i class="fa-solid fa-star text-rose-400 w-5"></i>${h}</div>`
                ).join('');
            }
            if(window.searchHistory.length > 0) {
                html += `<div class="bg-slate-50 px-3 py-1.5 text-xs font-bold text-slate-400 border-b border-slate-100">🕒 最近搜尋</div>`;
                html += window.searchHistory.map(h => 
                    `<div onclick="selectHistory('${h.replace(/'/g, "\\'")}')" class="px-4 py-3 hover:bg-slate-50 cursor-pointer text-sm text-slate-700 border-b border-slate-100 font-medium flex items-center"><i class="fa-solid fa-clock-rotate-left text-slate-400 w-5"></i>${h}</div>`
                ).join('');
            }
            drop.innerHTML = html;
            drop.classList.remove('hidden');
        }

        window.hideHistoryDelay = function() { setTimeout(() => { document.getElementById('history-dropdown').classList.add('hidden'); }, 200); }
        
        window.selectHistory = function(addr) { 
            document.getElementById('address-input').value = addr; 
            window.updateLocFavBtn();
            window.geocodeAddress(); 
        }

        window.saveHistory = function(addr) {
            if(window.favLocations.includes(addr)) return; 
            window.searchHistory = window.searchHistory.filter(h => h !== addr);
            window.searchHistory.unshift(addr);
            if (window.searchHistory.length > 10) window.searchHistory.pop(); 
            window.saveToLocal();
        }

        window.toggleFavLocation = function() {
            const addr = document.getElementById('address-input').value.trim();
            if(!addr) return window.showToast('請先輸入你要收藏的地址、商圈或地標！', 'error');
            
            if(window.favLocations.includes(addr)) {
                window.favLocations = window.favLocations.filter(l => l !== addr);
                window.showToast('💔 已取消收藏此地點');
            } else {
                window.favLocations.push(addr);
                window.searchHistory = window.searchHistory.filter(h => h !== addr);
                window.showToast('📍 成功收藏地點！');
            }
            window.saveToLocal();
        }

        window.updateLocFavBtn = function() {
            const addr = document.getElementById('address-input').value.trim();
            const btn = document.getElementById('btn-fav-loc');
            if(addr && window.favLocations.includes(addr)) {
                btn.innerHTML = '<i class="fa-solid fa-heart text-rose-500"></i>';
            } else {
                btn.innerHTML = '<i class="fa-regular fa-heart"></i>';
            }
        }

        window.initMap = function() {
            const mapOptions = {
                center: currentCenter,
                zoom: 15,
                styles: [
                    { featureType: "poi", elementType: "labels", stylers: [{ visibility: "off" }] },
                    { featureType: "poi.business", stylers: [{ visibility: "off" }] },
                    { featureType: "transit", elementType: "labels.icon", stylers: [{ visibility: "off" }] }
                ]
            };
            map = new google.maps.Map(document.getElementById("map"), mapOptions);
            service = new google.maps.places.PlacesService(map);
            geocoder = new google.maps.Geocoder();
            infowindow = new google.maps.InfoWindow();
        }

        if (window.gmapsLoaded) window.initMap();

        window.geocodeAddress = function() {
            const address = document.getElementById("address-input").value.trim();
            if (!address) return window.showToast("請先輸入地址或區域喔！", "error");

            geocoder.geocode({ 'address': address, 'region': 'TW' }, (results, status) => {
                if (status === 'OK') {
                    handleLocationFound(results[0].geometry.location, address);
                } else if (status === 'ZERO_RESULTS') {
                    service.findPlaceFromQuery({ query: address + " 台灣", fields: ['geometry'] }, (pResults, pStatus) => {
                        if (pStatus === google.maps.places.PlacesServiceStatus.OK && pResults) {
                            handleLocationFound(pResults[0].geometry.location, address);
                        } else {
                            window.showToast(`❌ 找不到「${address}」，請確認是否有錯字！`, "error");
                        }
                    });
                } else {
                    window.showToast(`⚠️ 定位發生錯誤: ${status}，請檢查 API 設定！`, "error");
                }
            });
        }

        window.getCurrentLocation = function() {
            if (navigator.geolocation) {
                window.showToast("⏳ 正在抓取您的位置...", "success");
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const pos = { lat: position.coords.latitude, lng: position.coords.longitude };
                        geocoder.geocode({ location: pos, region: 'TW' }, (results, status) => {
                            if (status === 'OK' && results[0]) {
                                const formattedAddress = results[0].formatted_address.replace(/^[0-9]+台灣/, '');
                                document.getElementById('address-input').value = formattedAddress;
                                handleLocationFound(pos, formattedAddress);
                            } else {
                                document.getElementById('address-input').value = "我的目前位置";
                                handleLocationFound(pos, "我的目前位置");
                            }
                        });
                    },
                    (error) => {
                        window.showToast("❌ 無法取得位置，請確認手機設定中是否有開啟瀏覽器的「位置資訊/GPS」權限，並確認網址是 https 開頭！", "error");
                    }
                );
            } else {
                window.showToast("❌ 您的瀏覽器不支援定位功能！", "error");
            }
        }

        function handleLocationFound(location, address) {
            currentCenter = location;
            map.setCenter(currentCenter);
            window.saveHistory(address);
            
            new google.maps.Marker({ 
                map: map, position: currentCenter, 
                icon: { path: google.maps.SymbolPath.CIRCLE, scale: 6, fillColor: '#2563eb', fillOpacity: 1, strokeWeight: 2, strokeColor: '#ffffff' }
            });
            window.showToast(`📍 定位成功！現在可以選擇你想吃的類別了`);
        }

        window.searchStoreName = function() {
            const name = document.getElementById('store-name-input').value.trim();
            if (!name) return window.showToast("請先輸入想搜尋的店名喔！", "error");
            document.getElementById('roulette-result').innerHTML = `🎯 鎖定目標：<span class="text-indigo-600">${name}</span>`;
            searchNearby(name, 1000); 
        }

        window.manualSearch = function(keyword) {
            document.getElementById('roulette-result').innerHTML = `🎯 鎖定目標：<span class="text-blue-600">${keyword}</span>`;
            searchNearby(keyword, 1000);
        }

        window.expandSearchTo8km = function() {
            searchNearby(window.currentKeyword, 8000); 
        }

        function searchNearby(keyword, radius) {
            if (!map) return;
            window.currentKeyword = keyword;
            currentRadius = radius;
            
            clearMarkers();
            window.currentPlacesList = [];
            currentPagination = null;

            document.getElementById('expand-btn').classList.add('hidden');
            document.getElementById('results-list-section').classList.add('hidden');
            document.getElementById('review-section').classList.add('hidden');
            document.getElementById('load-more-btn').classList.add('hidden');

            const request = { location: currentCenter, radius: currentRadius.toString(), keyword: keyword };
            service.nearbySearch(request, (results, status, pagination) => {
                handleSearchResults(results, status, pagination, keyword);
            });
        }

        function handleSearchResults(results, status, pagination, keyword) {
            if (status === google.maps.places.PlacesServiceStatus.OK && results) {
                const startIndex = window.currentPlacesList.length;
                window.currentPlacesList = window.currentPlacesList.concat(results); 
                
                results.forEach((place, index) => createMarker(place, startIndex + index));
                map.setZoom(currentRadius > 3000 ? 12 : (currentRadius > 1000 ? 13 : 15));
                if (currentRadius < 8000) document.getElementById('expand-btn').classList.remove('hidden');
                
                window.renderResultsList(window.currentPlacesList);
                window.showToast(`已找到 ${window.currentPlacesList.length} 家「${keyword}」！`);

                const loadBtn = document.getElementById('load-more-btn');
                if (pagination && pagination.hasNextPage) {
                    currentPagination = pagination;
                    loadBtn.classList.remove('hidden');
                    loadBtn.disabled = true;
                    loadBtn.innerText = "⏳ 尋找更多中...";
                    loadBtn.classList.add('opacity-50', 'cursor-not-allowed');
                    setTimeout(() => {
                        loadBtn.disabled = false;
                        loadBtn.innerText = "➕ 載入更多結果";
                        loadBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                    }, 2000);
                } else {
                    currentPagination = null;
                    loadBtn.classList.add('hidden');
                }
            } else {
                if(window.currentPlacesList.length === 0) {
                    window.showToast(`附近找不到「${keyword}」，試試擴大範圍或換個關鍵字？`, "error");
                    if (currentRadius < 8000) document.getElementById('expand-btn').classList.remove('hidden');
                }
            }
        }

        window.loadMoreResults = function() {
            if (currentPagination && currentPagination.hasNextPage) {
                const loadBtn = document.getElementById('load-more-btn');
                loadBtn.disabled = true;
                loadBtn.innerText = "⏳ 載入中...";
                loadBtn.classList.add('opacity-50', 'cursor-not-allowed');
                currentPagination.nextPage();
            }
        }

        window.renderResultsList = function(results) {
            const grid = document.getElementById('results-list-grid');
            document.getElementById('results-count').innerText = `共 ${results.length} 家`;
            grid.innerHTML = "";
            
            results.forEach((place, index) => {
                const isBad = window.reviews[place.name] && window.reviews[place.name].rating === 'bad';
                const isFav = window.favorites.some(f => f.name === place.name);
                
                const cardClass = isBad ? "bad-store-card" : "bg-white border-slate-200 hover:border-blue-300 hover:shadow-lg";
                const favColor = isFav ? "text-rose-500" : "text-slate-300";
                
                const card = `
                    <div class="${cardClass} p-4 rounded-xl border transition-all duration-300 flex flex-col relative shadow-sm">
                        <div class="flex justify-between items-start mb-2">
                            <h4 class="font-bold text-lg text-slate-800 line-clamp-1 flex-1" title="${place.name}">${place.name}</h4>
                            <button onclick="toggleFavFromList('${place.name.replace(/'/g, "\\'")}', '${place.types ? place.types.join(',') : ''}')" class="text-xl ${favColor} hover:text-rose-400 transition ml-2 z-10" title="加入最愛">
                                <i class="fa-solid fa-star"></i>
                            </button>
                        </div>
                        <p class="text-xs text-slate-500 mb-2 line-clamp-1"><i class="fa-solid fa-location-dot mr-1"></i>${place.vicinity || '無地址資訊'}</p>
                        
                        <div class="flex justify-between items-center mt-auto pt-3 border-t border-slate-200/60">
                            <div class="flex flex-col">
                                <span class="text-sm font-bold text-amber-500"><i class="fa-solid fa-star mr-1"></i>${place.rating || '--'}</span>
                            </div>
                            <button onclick="triggerMarkerClick(${index})" class="text-sm bg-blue-50 text-blue-600 px-4 py-2 rounded-lg font-bold hover:bg-blue-600 hover:text-white transition shadow-sm">
                                📝 看詳情
                            </button>
                        </div>
                    </div>
                `;
                grid.innerHTML += card;
            });
            document.getElementById('results-list-section').classList.remove('hidden');
        }

        window.triggerMarkerClick = function(index) {
            google.maps.event.trigger(markers[index], 'click');
            document.getElementById('review-section').scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        function createMarker(place, index) {
            if (!place.geometry || !place.geometry.location) return;

            const isBad = window.reviews[place.name] && window.reviews[place.name].rating === 'bad';
            
            const markerIcon = {
                path: "M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z",
                fillColor: isBad ? '#94a3b8' : '#ea4335',
                fillOpacity: 1, strokeWeight: 1, strokeColor: '#ffffff',
                scale: 1.5,
                anchor: new google.maps.Point(12, 24),
                labelOrigin: new google.maps.Point(12, -10)
            };

            const marker = new google.maps.Marker({
                map: map, 
                position: place.geometry.location, 
                title: place.name, 
                icon: markerIcon,
                label: {
                    text: place.name,
                    color: isBad ? '#475569' : '#b91c1c',
                    fontSize: '13px',
                    fontWeight: '900',
                    className: 'custom-map-label'
                }
            });
            markers.push(marker);

            google.maps.event.addListener(marker, "click", () => {
                infowindow.setContent(`<div class="font-bold p-1">${place.name}</div>`);
                infowindow.open(map, marker);
                loadPlaceDetails(place.place_id, place);
            });
        }
        
        function clearMarkers() { markers.forEach(m => m.setMap(null)); markers = []; }

        function loadPlaceDetails(placeId, basicPlace) {
            service.getDetails({ placeId: placeId, fields: ['name', 'rating', 'user_ratings_total', 'formatted_phone_number', 'opening_hours', 'photos', 'url', 'types'] }, (data, status) => {
                window.currentSelectedPlace = status === google.maps.places.PlacesServiceStatus.OK ? data : basicPlace;
                
                document.getElementById('review-target').innerText = window.currentSelectedPlace.name;
                document.getElementById('detail-rating').innerText = window.currentSelectedPlace.rating ? `Google 星級: ${window.currentSelectedPlace.rating} ⭐ (${window.currentSelectedPlace.user_ratings_total || 0} 則)` : "無評價";
                
                let hoursHTML = "營業時間未提供";
                if (window.currentSelectedPlace.opening_hours && window.currentSelectedPlace.opening_hours.weekday_text) {
                    hoursHTML = `<div class="text-xs space-y-1 mt-1 leading-relaxed">${window.currentSelectedPlace.opening_hours.weekday_text.join('<br>')}</div>`;
                } else if (window.currentSelectedPlace.opening_hours) {
                    let isOpenNow = null;
                    if (typeof window.currentSelectedPlace.opening_hours.isOpen === 'function') isOpenNow = window.currentSelectedPlace.opening_hours.isOpen();
                    else if (window.currentSelectedPlace.opening_hours.hasOwnProperty('open_now')) isOpenNow = window.currentSelectedPlace.opening_hours.open_now;
                    
                    if(isOpenNow === true) hoursHTML = '<span class="text-green-600 font-bold">目前營業中 🟢</span>';
                    else if(isOpenNow === false) hoursHTML = '<span class="text-red-500 font-bold">目前休息中 🔴</span>';
                }
                document.getElementById('detail-hours').innerHTML = hoursHTML;
                document.getElementById('detail-phone').innerText = window.currentSelectedPlace.formatted_phone_number || "無提供電話";
                document.getElementById('detail-url').href = window.currentSelectedPlace.url || `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(window.currentSelectedPlace.name)}`;
                
                const photoDiv = document.getElementById('detail-photos');
                photoDiv.innerHTML = "";
                if (window.currentSelectedPlace.photos) {
                    for(let i=0; i<Math.min(4, window.currentSelectedPlace.photos.length); i++){
                        photoDiv.innerHTML += `<img src="${window.currentSelectedPlace.photos[i].getUrl({maxWidth: 200, maxHeight: 150})}" class="rounded-lg h-24 object-cover shadow-sm border border-slate-200">`;
                    }
                }

                currentRating = "";
                document.getElementById('review-note').value = "";
                if (window.reviews[window.currentSelectedPlace.name]) {
                    currentRating = window.reviews[window.currentSelectedPlace.name].rating;
                    document.getElementById('review-note').value = window.reviews[window.currentSelectedPlace.name].note || "";
                }
                window.updateDetailUI();
                
                document.getElementById('review-section').classList.remove('hidden');
                document.getElementById('review-section').scrollIntoView({ behavior: 'smooth' });
            });
        }
        
        window.closeReview = function() { document.getElementById('review-section').classList.add('hidden'); }

        window.rate = function(type) {
            currentRating = type;
            window.updateDetailUI();
        }

        window.updateDetailUI = function() {
            const btnGood = document.getElementById('btn-good');
            const btnBad = document.getElementById('btn-bad');
            btnGood.className = "flex-1 bg-white hover:bg-green-50 text-slate-600 border border-slate-200 font-bold py-2.5 rounded-xl transition shadow-sm";
            btnBad.className = "flex-1 bg-white hover:bg-red-50 text-slate-600 border border-slate-200 font-bold py-2.5 rounded-xl transition shadow-sm";

            if (currentRating === 'good') btnGood.className = "flex-1 bg-green-500 text-white border-green-600 font-bold py-2.5 rounded-xl transition shadow-md";
            if (currentRating === 'bad') btnBad.className = "flex-1 bg-red-500 text-white border-red-600 font-bold py-2.5 rounded-xl transition shadow-md";

            if (window.currentSelectedPlace) {
                const isFav = window.favorites.some(f => f.name === window.currentSelectedPlace.name);
                document.getElementById('fav-btn-detail').innerHTML = isFav ? `<i class="fa-solid fa-star text-rose-500"></i>` : `<i class="fa-regular fa-star"></i>`;
            }
        }

        window.saveReview = function() {
            if (!window.currentSelectedPlace || !currentRating) return window.showToast("請先選擇超讚或踩雷！", "error");
            
            let cat = '美食';
            if(window.currentSelectedPlace.types) cat = autoCategorize(window.currentSelectedPlace.types.join(','), window.currentSelectedPlace.name);

            window.reviews[window.currentSelectedPlace.name] = { rating: currentRating, note: document.getElementById('review-note').value, category: cat };
            window.saveToLocal(); 
            window.showToast("💾 筆記儲存成功！");
        }

        function autoCategorize(typesStr, name) {
            const str = (typesStr + name).toLowerCase();
            if (str.includes('cafe') || str.includes('bakery') || str.includes('咖啡') || str.includes('甜點') || str.includes('蛋糕') || str.includes('冰') || str.includes('豆花')) return '甜點';
            if (str.includes('茶') || str.includes('飲') || str.includes('飲料') || str.includes('珍珠')) return '飲料';
            return '美食';
        }

        window.toggleFavFromList = function(placeName, typesStr) {
            const index = window.favorites.findIndex(f => f.name === placeName);
            if (index > -1) {
                window.favorites.splice(index, 1);
                window.showToast("💔 已移除最愛");
            } else {
                const cat = autoCategorize(typesStr, placeName);
                window.favorites.push({ name: placeName, category: cat });
                window.showToast(`❤️ 加入最愛！`);
            }
            window.saveToLocal();
        }

        window.toggleFavoriteFromDetail = function() {
            if (!window.currentSelectedPlace) return;
            window.toggleFavFromList(window.currentSelectedPlace.name, window.currentSelectedPlace.types ? window.currentSelectedPlace.types.join(',') : '');
        }

        window.toggleFavModal = function() {
            const modal = document.getElementById('fav-modal');
            if (modal.classList.contains('hidden')) { window.renderFavList(); modal.classList.remove('hidden'); } 
            else { modal.classList.add('hidden'); }
        }

        window.renderFavList = function() {
            const content = document.getElementById('fav-list-content');
            if (window.favorites.length === 0 && window.favLocations.length === 0) return content.innerHTML = '<p class="text-center text-slate-400 py-10">你的清單空空的喔！趕快去探索吧！</p>';

            let html = "";
            if(window.favLocations.length > 0) {
                html += `<div class="mb-6"><h3 class="font-extrabold text-slate-700 mb-2 border-b-2 border-slate-100 pb-1">📍 常用地點</h3><ul class="space-y-2">`;
                html += window.favLocations.map(l => `
                    <li class="flex justify-between items-center bg-white p-3 border border-slate-200 rounded-xl shadow-sm hover:border-blue-300 transition">
                        <span class="font-bold text-slate-700 cursor-pointer flex-1" onclick="selectHistory('${l.replace(/'/g, "\\'")}'); toggleFavModal();">${l}</span>
                        <button onclick="removeFavLocModal('${l.replace(/'/g, "\\'")}')" class="text-xs text-red-500 hover:bg-red-50 px-2 py-1 rounded transition ml-2"><i class="fa-solid fa-trash"></i></button>
                    </li>
                `).join('');
                html += `</ul></div>`;
            }

            const grouped = { '美食': [], '飲料': [], '甜點': [] };
            window.favorites.forEach(f => { if (grouped[f.category]) grouped[f.category].push(f); else grouped['美食'].push(f); });

            const icons = { '美食': '🍱', '飲料': '🧋', '甜點': '🍰' };
            ['美食', '飲料', '甜點'].forEach(cat => {
                if (grouped[cat].length > 0) {
                    html += `<div class="mb-6"><h3 class="font-extrabold text-slate-700 mb-2 border-b-2 border-slate-100 pb-1">${icons[cat]} 收藏的${cat}</h3><ul class="space-y-2">`;
                    html += grouped[cat].map(f => `
                        <li class="flex justify-between items-center bg-white p-3 border border-slate-200 rounded-xl shadow-sm">
                            <span class="font-bold text-slate-700">${f.name}</span>
                            <button onclick="removeFavModal('${f.name.replace(/'/g, "\\'")}')" class="text-xs text-red-500 hover:bg-red-50 px-2 py-1 rounded transition"><i class="fa-solid fa-trash"></i></button>
                        </li>
                    `).join('');
                    html += `</ul></div>`;
                }
            });
            content.innerHTML = html;
        }

        window.removeFavModal = function(name) {
            window.favorites = window.favorites.filter(f => f.name !== name);
            window.saveToLocal();
        }
        
        window.removeFavLocModal = function(addr) {
            window.favLocations = window.favLocations.filter(l => l !== addr);
            window.saveToLocal();
        }

        window.spinRoulette = function(type) {
            playRouletteAnimation(type === 'food' ? foodList : drinkList);
        }

        window.spinPocket = function() {
            const cat = document.getElementById('pocket-category').value;
            const pocketSet = new Set();
            
            window.favorites.forEach(f => { if (cat === 'all' || f.category === cat) pocketSet.add(f.name); });
            Object.keys(window.reviews).forEach(name => {
                if (window.reviews[name].rating === 'good') {
                    if (cat === 'all' || window.reviews[name].category === cat) pocketSet.add(name);
                }
            });

            const pocketList = Array.from(pocketSet);
            if (pocketList.length === 0) return window.showToast("這個分類的口袋名單還是空的喔！", "error");
            playRouletteAnimation(pocketList, 3000); 
        }

        function playRouletteAnimation(list, radius = 1000) {
            const res = document.getElementById('roulette-result');
            let times = 0;
            const timer = setInterval(() => {
                res.innerText = `🤔 思考中：${list[Math.floor(Math.random() * list.length)]}`;
                times++;
                if (times > 15) {
                    clearInterval(timer);
                    const finalChoice = list[Math.floor(Math.random() * list.length)];
                    res.innerHTML = `🎉 決定就是你了：<span class="text-rose-500 font-extrabold">${finalChoice}</span>`;
                    searchNearby(finalChoice, radius);
                }
            }, 80);
        }
    </script>
    
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyB8Grjw2NayEbYrv1zFFAvMzYTdSR-Fk9I&libraries=places&callback=initMapAsync" async defer></script>
